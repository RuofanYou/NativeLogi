name: Device support
description: Request support or diagnostics for a Logitech device.
title: "[Device]: "
labels: ["device-support"]
body:
  - type: input
    id: model
    attributes:
      label: Device model
      placeholder: MX Master 3S
    validations:
      required: true
  - type: dropdown
    id: connection
    attributes:
      label: Connection type
      options:
        - Bluetooth
        - Logi Bolt
        - USB / wired
        - Other
    validations:
      required: true
  - type: textarea
    id: list
    attributes:
      label: "`openlogi list` output"
      description: The CLI name is still openlogi during the first NativeLogi migration phase.
  - type: textarea
    id: details
    attributes:
      label: What does not work yet?
