name: Bug report
description: Report a NativeLogi bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        NativeLogi is an independent project and is not affiliated with Logitech.
  - type: checkboxes
    id: checks
    attributes:
      label: Before filing
      options:
        - label: I quit Logi Options+ before testing NativeLogi.
          required: true
        - label: I checked whether NativeLogi has Accessibility and Input Monitoring permissions.
          required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: commit hash or release version
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Include expected behavior and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: device
    attributes:
      label: Device and macOS details
      description: Include Logitech mouse model, connection type, macOS version, and relevant logs.
