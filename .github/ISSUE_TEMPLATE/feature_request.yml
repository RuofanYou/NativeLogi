name: Feature request
description: Suggest an improvement for NativeLogi.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or device behavior should NativeLogi improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Device context
      description: Include mouse model, connection type, and current Logi Options+ behavior if relevant.
